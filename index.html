<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>おしたくおうえん - 完全版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: { 
                          pink: '#FFD1DC', pinkDeep: '#FF1493', cream: '#FFFDD0', 
                          blue: '#AEC6CF', blueDeep: '#4169E1', yellow: '#FDFD96', 
                          green: '#C6F6D5', greenDeep: '#2F855A'
                        }
                    },
                    borderRadius: { '4xl': '2rem', '5xl': '3rem' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #FFFDF0; margin: 0; padding: 0; overflow: hidden; background-size: cover; background-position: center; }
        @media (min-width: 768px) { body { background-image: url('PC2.png'); } }
        @media (max-width: 767px) { body { background-image: url('smf2.png'); } }
        .btn-puffy { box-shadow: 0 6px 0 rgba(0,0,0,0.1); transition: all 0.2s; cursor: pointer; border: 3px solid white; }
        .btn-puffy:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
        .btn-puffy:disabled { transform: none; box-shadow: none; cursor: default; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .animate-jump { animation: jump 1.2s ease-in-out infinite; }
        @keyframes waddle { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        .animate-waddle { animation: waddle 0.8s ease-in-out infinite; }
        @keyframes stamp-appear {
            0% { transform: scale(3); opacity: 0; }
            70% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1); }
        }
        .animate-stamp { animation: stamp-appear 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .tab-active-asa { background-color: #FF1493 !important; color: white !important; }
        .tab-active-yoru { background-color: #4169E1 !important; color: white !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .checkmark-svg { width: 100%; height: 100%; stroke: white; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
</head>
<body>
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; color:#ccc;">よみこみちゅう...</div>
    </div>
    <script>
        const e = React.createElement;
        const { useState, useEffect } = React;

        const megaFirework = () => {
            const end = Date.now() + (4 * 1000);
            const colors = ['#FF1493', '#4169E1', '#FFD700', '#77DD77', '#FF69B4', '#87CEEB'];
            (function frame() {
              confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
              confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
              if (Date.now() < end) requestAnimationFrame(frame);
            }());
            setTimeout(() => {
                confetti({ particleCount: 400, spread: 160, origin: { y: 0.6 }, colors: colors, shapes: ['circle', 'square', 'star'], scalar: 1.5 });
            }, 1500);
        };

        const initialTasks = {
            asa: [
                { id: 1, name: 'かおをあらう', time: 180, completed: false }, 
                { id: 2, name: 'はみがき', time: 120, completed: false }, 
                { id: 3, name: 'おきがえ', time: 300, completed: false },
                { id: 4, name: 'ごはん', time: 600, completed: false },
                { id: 5, name: 'みじたく', time: 300, completed: false },
                { id: 6, name: 'じゅんび', time: 300, completed: false },
                { id: 7, name: 'チャレンジ', time: 600, completed: false },
                { id: 8, name: 'ピアノ', time: 900, completed: false },
                { id: 9, name: 'どんぐり', time: 300, completed: false },
                { id: 10, name: 'かたづけ', time: 300, completed: false }
            ],
            yoru: [
                { id: 11, name: 'おきがえ', time: 300, completed: false }, 
                { id: 12, name: 'ごはん', time: 600, completed: false }, 
                { id: 13, name: 'あしたのじゅんび', time: 300, completed: false },
                { id: 14, name: '一輪車', time: 900, completed: false },
                { id: 15, name: 'かたづけ', time: 300, completed: false },
                { id: 16, name: 'おふろ', time: 900, completed: false },
                { id: 17, name: 'はみがき', time: 180, completed: false },
                { id: 18, name: 'かみかわかす', time: 300, completed: false }
            ]
        };

        const App = () => {
            const [screen, setScreen] = useState('top'); 
            const [mode, setMode] = useState('asa');
            const [activeTask, setActiveTask] = useState(null);
            const [timeLeft, setTimeLeft] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [history, setHistory] = useState([]);
            const [isInitialized, setIsInitialized] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [tasks, setTasks] = useState(initialTasks);

            useEffect(() => {
                const t = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                const saved = localStorage.getItem('ositaku_v12_save');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.tasks) setTasks(parsed.tasks);
                        if (parsed.history) setHistory(parsed.history);
                    } catch (err) { }
                }
                setIsInitialized(true);
            }, []);

            useEffect(() => {
                if (isInitialized) localStorage.setItem('ositaku_v12_save', JSON.stringify({ tasks, history }));
            }, [tasks, history, isInitialized]);

            const speak = (text) => {
                if (!window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text); u.lang = 'ja-JP';
                window.speechSynthesis.speak(u);
            };

            const markTaskDone = (id) => {
                setTasks(prev => {
                    const next = JSON.parse(JSON.stringify(prev));
                    next[mode] = next[mode].map(t => t.id === id ? { ...t, completed: true } : t);
                    if (next[mode].every(t => t.completed)) {
                        const todayStr = new Date().toISOString().split('T')[0];
                        setHistory(h => {
                            const exists = h.some(e => e.date === todayStr && e.type === mode);
                            return exists ? h : [...h, { date: todayStr, type: mode }];
                        });
                        megaFirework();
                        setTimeout(() => setScreen('calendar'), 2500);
                    }
                    return next;
                });
                setActiveTask(null); setIsTimerRunning(false);
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
                speak('すごい！よくできました！');
            };

            useEffect(() => {
                let timer;
                if (isTimerRunning && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => { 
                            if (prev <= 1) { 
                                setIsTimerRunning(false);
                                speak('じかんですよ！');
                                return 0; 
                            } 
                            return prev - 1; 
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [isTimerRunning, timeLeft, activeTask]);

            const updateTaskData = (id, field, value) => {
                setTasks(prev => {
                    const next = JSON.parse(JSON.stringify(prev));
                    next[mode] = next[mode].map(t => t.id === id ? { ...t, [field]: value } : t);
                    return next;
                });
            };

            const addTask = () => {
                setTasks(prev => {
                    const next = JSON.parse(JSON.stringify(prev));
                    const newId = Date.now();
                    next[mode].push({ id: newId, name: 'あたらしいタスク', time: 300, completed: false });
                    return next;
                });
            };

            const deleteTask = (id) => {
                setTasks(prev => {
                    const next = JSON.parse(JSON.stringify(prev));
                    next[mode] = next[mode].filter(t => t.id !== id);
                    return next;
                });
            };

            const weekDates = (() => {
                const today = new Date();
                const currentDay = today.getDay();
                const diff = today.getDate() - (currentDay === 0 ? 6 : currentDay - 1);
                const monday = new Date(new Date().setDate(diff));
                return [...Array(7)].map((_, i) => { const d = new Date(monday); d.setDate(monday.getDate() + i); return d.toISOString().split('T')[0]; });
            })();

            const Header = e('div', { className: "bg-white/95 p-2 sm:p-3 flex flex-col sm:flex-row items-center justify-between shadow-md rounded-b-3xl relative z-20 gap-2 sm:gap-4" },
                e('div', { className: "flex items-center justify-between w-full sm:w-auto gap-2 sm:gap-4" },
                    e('div', { className: "flex items-center gap-2 sm:gap-3" },
                        e('button', { onClick: () => setScreen('admin'), className: "w-8 h-8 sm:w-10 sm:h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-400 text-lg sm:text-xl" }, "⚙"),
                        e('div', { className: "text-xl sm:text-2xl font-black text-gray-700 font-mono" }, currentTime.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })),
                    ),
                    e('div', { className: "flex gap-1 sm:gap-2" },
                        e('button', { onClick: () => setScreen('main'), className: `px-3 sm:px-4 py-1.5 sm:py-2 rounded-full font-black text-[10px] sm:text-sm transition-all ${screen === 'main' ? 'bg-pastel-pinkDeep text-white' : 'bg-gray-50 text-gray-300'}` }, "🕒 とけい"),
                        e('button', { onClick: () => setScreen('calendar'), className: `px-3 sm:px-4 py-1.5 sm:py-2 rounded-full font-black text-[10px] sm:text-sm ${screen === 'calendar' ? 'bg-pastel-blueDeep text-white' : 'bg-gray-50 text-gray-300'}` }, "📅 かれんだー")
                    )
                ),
                e('div', { className: "flex justify-center" },
                    e('div', { className: "flex bg-gray-100 rounded-full p-1 shadow-inner" },
                        e('button', { onClick: () => setMode('asa'), className: `px-6 sm:px-10 py-1.5 sm:py-2 rounded-full font-black text-xs sm:text-sm ${mode === 'asa' ? 'tab-active-asa' : 'text-gray-400'}` }, "あさ"),
                        e('button', { onClick: () => setMode('yoru'), className: `px-6 sm:px-10 py-1.5 sm:py-2 rounded-full font-black text-xs sm:text-sm ${mode === 'yoru' ? 'tab-active-yoru' : 'text-gray-400'}` }, "よる")
                    )
                ),
                e('div', { className: "hidden sm:block w-32" })
            );

            if (screen === 'top') return e('div', { className: "h-screen flex flex-col items-center justify-center p-8 text-center" },
                e('div', { className: "flex gap-10 mb-8" },
                    e('img', { src: "rabbit.png", className: "w-24 h-24 sm:w-36 sm:h-36 object-contain animate-jump" }),
                    e('img', { src: "risu.png", className: "w-24 h-24 sm:w-36 sm:h-36 object-contain animate-waddle" })
                ),
                e('h1', { className: "text-5xl sm:text-8xl font-black text-gray-800 drop-shadow-lg mb-10" }, "おしたくおうえん"),
                e('button', { onClick: () => { setScreen('main'); speak('スタート！'); }, className: "bg-pastel-pink text-white text-3xl sm:text-4xl font-black px-12 sm:px-20 py-6 sm:py-8 rounded-full btn-puffy shadow-xl border-4 border-white" }, "▶ スタート")
            );

            if (screen === 'calendar') return e('div', { className: "h-screen flex flex-col" },
                Header,
                e('div', { className: "flex-1 p-3 sm:p-6 relative overflow-hidden" },
                    e('div', { className: "h-full bg-white/90 backdrop-blur-md rounded-4xl p-4 sm:p-8 border-4 border-white shadow-2xl overflow-y-auto hide-scrollbar" },
                        e('h2', { className: "text-xl sm:text-3xl font-black text-gray-700 mb-6 sm:mb-10 text-center" }, "こんしゅうの スタンプ"),
                        e('div', { className: "grid grid-cols-8 gap-1 sm:gap-4 min-w-[280px]" },
                            e('div'), ['月', '火', '水', '木', '金', '土', '日'].map(d => e('div', { key: d, className: "text-center font-black text-gray-400 text-xs sm:text-xl" }, d)),
                            e('div', { className: "text-pastel-pinkDeep font-black text-[10px] sm:text-2xl flex items-center justify-center" }, "あさ"),
                            weekDates.map((date, i) => e('div', { key: i, className: "aspect-square bg-gray-50 rounded-lg sm:rounded-3xl flex items-center justify-center border sm:border-2 border-white shadow-inner relative" }, 
                                history.some(h => h.date === date && h.type === 'asa') && e('div', { className: "text-2xl sm:text-5xl animate-stamp" }, "☀️")
                            )),
                            e('div', { className: "text-pastel-blueDeep font-black text-[10px] sm:text-2xl flex items-center justify-center" }, "よる"),
                            weekDates.map((date, i) => e('div', { key: i, className: "aspect-square bg-gray-50 rounded-lg sm:rounded-3xl flex items-center justify-center border sm:border-2 border-white shadow-inner relative" }, 
                                history.some(h => h.date === date && h.type === 'yoru') && e('div', { className: "text-2xl sm:text-5xl animate-stamp" }, "🌙")
                            ))
                        )
                    ),
                    e('img', { src: "rabbit.png", className: "fixed bottom-2 left-2 w-20 h-20 sm:w-28 sm:h-28 object-contain animate-jump" }),
                    e('img', { src: "risu.png", className: "fixed bottom-2 right-2 w-20 h-20 sm:w-28 sm:h-28 object-contain animate-waddle" })
                )
            );

            if (screen === 'admin') return e('div', { className: "h-screen flex flex-col bg-white" },
                e('div', { className: "p-4 border-b flex justify-between items-center" },
                    e('button', { onClick: () => setScreen('main'), className: "font-black text-gray-400" }, "← もどる"),
                    e('h2', { className: "font-black text-gray-800" }, "かんり画面"),
                    e('div', { className: "w-10" })
                ),
                e('div', { className: "p-4 bg-gray-50 flex justify-center border-b" },
                    e('div', { className: "flex bg-gray-200 rounded-full p-1" },
                        e('button', { onClick: () => setMode('asa'), className: `px-8 py-2 rounded-full font-black text-sm ${mode === 'asa' ? 'tab-active-asa' : 'text-gray-400'}` }, "あさ"),
                        e('button', { onClick: () => setMode('yoru'), className: `px-8 py-2 rounded-full font-black text-sm ${mode === 'yoru' ? 'tab-active-yoru' : 'text-gray-400'}` }, "よる")
                    )
                ),
                e('div', { className: "flex-1 overflow-y-auto p-4 space-y-3" },
                    tasks[mode].map(t => e('div', { key: t.id, className: "p-3 border-2 border-gray-100 rounded-2xl flex items-center gap-2 shadow-sm bg-white" },
                        e('input', { type: "text", value: t.name, onChange: (ev) => updateTaskData(t.id, 'name', ev.target.value), className: "flex-1 bg-gray-50 rounded-lg px-2 py-2 font-black text-sm" }),
                        e('div', { className: "flex items-center bg-gray-100 rounded-xl p-1" },
                            e('button', { onClick: () => updateTaskData(t.id, 'time', Math.max(60, t.time - 60)), className: "w-8 h-8 bg-white rounded-lg font-black" }, "◀"),
                            e('span', { className: "px-2 font-black text-xs" }, `${t.time/60}分`),
                            e('button', { onClick: () => updateTaskData(t.id, 'time', t.time + 60), className: "w-8 h-8 bg-white rounded-lg font-black" }, "▶")
                        ),
                        e('button', { onClick: () => deleteTask(t.id), className: "w-10 h-10 bg-red-50 text-red-400 rounded-xl font-black" }, "×")
                    )),
                    e('button', { onClick: addTask, className: "w-full py-4 bg-pastel-green text-pastel-greenDeep font-black rounded-2xl border-2 border-dashed border-pastel-greenDeep mt-4" }, "＋ あたらしいタスクを追加")
                ),
                e('div', { className: "p-4 border-t" },
                    e('button', { onClick: () => { if(confirm('すべて初期状態に戻してもいいですか？')) { setTasks(initialTasks); localStorage.removeItem('ositaku_v12_save'); location.reload(); } }, className: "w-full py-3 bg-red-100 text-red-500 font-black rounded-xl text-sm" }, "⚠️ ぜんぶ初期設定に戻す")
                )
            );

            return e('div', { className: "h-screen flex flex-col" },
                Header,
                e('div', { className: "flex-1 p-3 sm:p-6 overflow-y-auto hide-scrollbar relative" },
                    e('div', { className: "grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-6" },
                        tasks[mode].map(t => e('button', { 
                            key: t.id, 
                            onClick: () => { if(!t.completed) { setActiveTask(t); setTimeLeft(t.time); setIsTimerRunning(true); speak(t.name + ' スタート！'); } },
                            disabled: t.completed,
                            className: `p-4 sm:p-6 rounded-3xl sm:rounded-5xl flex justify-between items-center transition-all ${t.completed ? 'bg-pastel-green border-2 sm:border-4 border-pastel-greenDeep opacity-100' : 'bg-white/90 backdrop-blur-sm shadow-xl btn-puffy border-2 sm:border-4 border-white'}`
                        }, 
                            e('div', { className: "flex items-center gap-3 sm:gap-4" },
                                e('div', { className: `w-10 h-10 sm:w-14 sm:h-14 rounded-full flex items-center justify-center p-2 sm:p-3 ${t.completed ? 'bg-pastel-greenDeep' : 'bg-pastel-cream text-gray-300'}` }, 
                                    t.completed ? e('svg', { className: "checkmark-svg", viewBox: "0 0 24 24" }, e('path', { d: "M5 13l4 4L19 7" })) : e('span', { className: "text-lg sm:text-2xl font-black" }, "★")
                                ),
                                e('span', { className: `text-xl sm:text-3xl font-black ${t.completed ? 'text-pastel-greenDeep line-through opacity-50' : 'text-gray-700'}` }, t.name)
                            ),
                            e('div', { className: "text-right" },
                                t.completed && e('span', { className: "text-pastel-greenDeep font-black text-lg sm:text-2xl" }, "できた！"),
                                !t.completed && e('span', { className: "text-gray-400 font-black text-lg sm:text-2xl" }, `${t.time/60}分`)
                            )
                        ))
                    ),
                    e('img', { src: "rabbit.png", className: "fixed bottom-2 left-2 w-20 h-20 sm:w-32 sm:h-32 object-contain animate-jump pointer-events-none" }),
                    e('img', { src: "risu.png", className: "fixed bottom-2 right-2 w-20 h-20 sm:w-32 sm:h-32 object-contain animate-waddle pointer-events-none" })
                ),
                activeTask && e('div', { className: "fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center p-4 sm:p-8" },
                    e('div', { className: "text-2xl sm:text-5xl font-black text-gray-500 mb-4 sm:mb-8" }, activeTask.name),
                    e('div', { className: `text-[6rem] sm:text-[15rem] md:text-[20rem] font-black leading-none mb-6 sm:mb-12 ${timeLeft <= 60 ? 'text-red-500 animate-pulse' : 'text-gray-700'}` }, `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`),
                    e('div', { className: "flex flex-wrap justify-center gap-4 sm:gap-10" },
                        e('button', { onClick: () => setIsTimerRunning(!isTimerRunning), className: "w-20 h-20 sm:w-32 sm:h-32 rounded-full bg-gray-100 flex items-center justify-center text-4xl sm:text-7xl shadow-xl active:scale-95" }, isTimerRunning ? "⏸" : "▶"),
                        e('button', { onClick: () => setTimeLeft(prev => prev + 60), className: "px-8 sm:px-16 py-4 sm:py-8 rounded-full bg-pastel-yellow text-gray-700 font-black text-xl sm:text-4xl shadow-xl border-b-4 sm:border-b-8 border-yellow-200" }, "＋1ふん"),
                        e('button', { onClick: () => markTaskDone(activeTask.id), className: "px-8 sm:px-16 py-4 sm:py-8 rounded-full bg-pastel-green text-pastel-greenDeep font-black text-xl sm:text-4xl shadow-xl border-b-4 sm:border-b-8 border-green-600" }, "おわった！"),
                        e('button', { onClick: () => { setActiveTask(null); setIsTimerRunning(false); }, className: "px-8 sm:px-16 py-4 sm:py-8 rounded-full bg-gray-200 text-gray-500 font-bold text-xl sm:text-4xl border-b-4 sm:border-b-8 border-gray-300" }, "やめる")
                    )
                )
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
