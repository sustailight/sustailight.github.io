<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スワミライ様ショールーム</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  .slideshow {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 2.5s ease-in-out;
  }
  .slide.active {
    opacity: 1;
  }
  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 64px;
    height: 64px;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    backdrop-filter: blur(4px);
  }
  .nav-btn:hover {
    background: rgba(255, 255, 255, 0.45);
  }
  .prev-btn { left: 24px; }
  .next-btn { right: 24px; }
  .indicator {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 12px;
  }
  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.4);
    cursor: pointer;
    transition: background 0.2s;
  }
  .dot.active {
    background: #fff;
  }
</style>
</head>
<body>
  <div class="slideshow">
    <img class="slide active" src="１.jpg" alt="1">
    <img class="slide" src="２.png" alt="2">
    <img class="slide" src="３.png" alt="3">
  </div>

  <button class="nav-btn prev-btn" onclick="prevSlide()">‹</button>
  <button class="nav-btn next-btn" onclick="nextSlide()">›</button>

  <div class="indicator"></div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const indicator = document.querySelector('.indicator');
    let current = 0;

    // インジケーター（ドット）の生成
    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.onclick = () => goToSlide(i);
      indicator.appendChild(dot);
    });
    const dots = document.querySelectorAll('.dot');

    function goToSlide(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (index + slides.length) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    function nextSlide() {
      goToSlide(current + 1);
    }

    function prevSlide() {
      goToSlide(current - 1);
    }

    // キーボード操作（左右矢印キー）
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });
  </script>
</body>
</html>
